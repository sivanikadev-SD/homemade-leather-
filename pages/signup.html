<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account – Cordovan Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="icon" type="image/png" href="../assets/favicon.png"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/style.css"/>
<link rel="stylesheet" href="../assets/css/dark-mode.css"/>
<link rel="stylesheet" href="../assets/css/rtl.css"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-top-right">
      <button class="btn-icon" onclick="toggleTheme()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
      <button class="btn-icon" id="rtl-toggle-btn" onclick="toggleRTL()" title="Switch to RTL">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16l-4-4 4-4M3 12h18M17 8l4 4-4 4"/></svg>
      </button>
    </div>
    <div class="auth-logo" onclick="showPage('home')">
      <div class="logo-mark" style="width:32px;height:32px"><svg width="16" height="16" viewBox="0 0 18 18" fill="white"><path d="M9 2C5.1 2 2 5.1 2 9s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7zm0 2c1.4 0 2.6.5 3.6 1.4L4.4 12.6C3.5 11.6 3 10.4 3 9c0-3.3 2.7-6 6-6zm0 10c-1.4 0-2.6-.5-3.6-1.4l8.2-8.2C14.5 7.4 15 8.6 15 10c0 3.3-2.7 5.9-6 5.9z"/></svg></div>
      <span>Cordovan</span>
    </div>
    <h2 class="auth-title">Create an account</h2>
    <p class="auth-sub">Join the atelier community. Track orders, save favourites, start commissions.</p>
    <div class="social-btns">
      <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google</button>
      <button class="social-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> Continue with Apple</button>
    </div>
    <div class="auth-divider">or sign up with email</div>
    <div class="form-group"><label>First Name</label><input type="text" placeholder="First name"/></div>
    <div class="form-group"><label>Last Name</label><input type="text" placeholder="Last name"/></div>
    <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@example.com"/></div>
    <div class="form-group"><label>Password</label><div class="input-wrap"><input type="password" id="sp2" placeholder="Create a strong password"/><button class="eye-btn" onclick="togglePwd('sp2')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
    <button class="btn-hide btn-full" style="margin-top:8px">Create Account</button>
    <div class="auth-footer">Already have an account? <a onclick="showPage('login')">Sign in</a></div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
function showPage(id) {
  var map = {
    home: '../index.html',
    home2: '../index-2.html',
    services: 'services.html',
    shop: 'shop.html', about: 'about.html',
    contact: 'contact.html', pricing: 'pricing.html',
    login: 'login.html', signup: 'signup.html'
  };
  if (map[id]) location.href = map[id];
}
var sp = showPage;
</script>
</body>
</html>
